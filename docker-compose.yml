version: '3.8'

services:
  portofolio-web:
    image: gerardoardianta/portofolio-web:latest
    container_name: nextjs_portofolio
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web_network
  proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80" 
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portofolio-web
    networks:
      - web_network

networks:
  web_network:
    driver: bridge