server {
    # Mendengarkan traffic HTTP yang masuk ke port 80
    listen 80;
    listen [::]:80;
    
    # Menangkap semua domain/IP. Nanti bisa diganti dengan 'namadomain.com'
    server_name _; 

    # Jangan tampilkan versi Nginx di header HTTP (Keamanan)
    server_tokens off;

    location / {
        # Meneruskan traffic ke service Next.js (portofolio-web) di port 3000
        proxy_pass http://portofolio-web:3000;
        
        # Header standar untuk meneruskan identitas pengunjung asli ke Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}