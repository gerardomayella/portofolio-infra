global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'portofolio-web'
    static_configs:
      - targets: ['portofolio-web:3000']
  
  - job_name: 'proxy'
    static_configs:
      - targets: ['nginx_exporter:9113']